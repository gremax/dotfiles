# Font Configuration
font_family      JetBrainsMono Nerd
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 15.0

# Color Scheme
include gruvbox-dark.conf

background_opacity 0.95

# Terminal Type (fixes SSH terminfo errors)
term xterm-256color

# Window & Tab Management
enabled_layouts tall:bias=50;full_size=1;mirrored=false,stack
window_padding_width 4
window_margin_width 4
confirm_os_window_close 0

window_border_width     1pt
active_border_color     #44ffff

# Tab bar styling
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title[title.rfind('/')+1:]}"

# Scrollback & History
scrollback_lines 50000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# Performance & Rendering
repaint_delay 10
input_delay 3
sync_to_monitor yes

# URL Handling
url_style curly
detect_urls yes
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh

# Clipboard
copy_on_select yes
strip_trailing_spaces smart

# Cursor
cursor_shape block
cursor_blink_interval 0

# Key Mappings
# Tab navigation
map cmd+t new_tab
map cmd+w close_tab
map cmd+shift+] next_tab
map cmd+shift+[ previous_tab
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Window navigation
map cmd+enter new_window
map cmd+d close_window

# Font size
map cmd+equal change_font_size all +2.0
map cmd+minus change_font_size all -2.0
map cmd+0 change_font_size all 0

# Scrollback search (opens pager, use / to search)
map cmd+f show_scrollback
